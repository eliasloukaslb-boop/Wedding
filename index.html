<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michel & Lynn's Wedding</title>
    <style>
        :root {
            --gold: #c5a059;
            --off-white: #fdfcf8;
            --dark-text: #4a4a4a;
            --red-wax: #a30000;
        }

        body {
            margin: 0;
            font-family: 'Georgia', serif;
            background-color: var(--off-white);
            color: var(--dark-text);
            text-align: center;
            overflow-x: hidden;
        }

        /* --- WAX SEAL OVERLAY --- */
        #envelope-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999; /* Ensures it is on top of everything */
            transition: opacity 0.8s ease;
        }

        .wax-seal {
            width: 130px;
            height: 130px;
            background: radial-gradient(circle, #d40000 0%, var(--red-wax) 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 4px solid #8b0000;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            position: relative;
            z-index: 10000;
        }

        /* Animation when clicking */
        .wax-seal:active {
            transform: scale(0.9);
        }

        /* --- MAIN CONTENT --- */
        .content {
            padding: 40px 20px;
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 1s ease;
            display: none; /* Hidden until opened */
        }

        .show-content {
            display: block !important;
            opacity: 1;
            transform: translateY(0);
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; color: var(--gold); }
        .date { font-style: italic; margin-bottom: 30px; }

        /* --- COUNTDOWN --- */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 30px 0;
        }

        .time-box {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            min-width: 65px;
        }

        .time-box span { display: block; font-size: 1.4rem; font-weight: bold; color: var(--gold); }
        .time-label { font-size: 0.65rem; text-transform: uppercase; color: #999; }

        /* --- RSVP SECTION --- */
        .rsvp-section {
            background: white;
            padding: 30px;
            margin: 40px auto;
            max-width: 350px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        input, select, button {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 16px;
        }

        button {
            background-color: var(--gold);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
        }

        .hidden-overlay {
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>

    <div id="envelope-overlay">
        <div class="wax-seal" onclick="openInvite()" ontouchstart="openInvite()">
            Love
        </div>
    </div>

    <div class="content" id="main-content">
        <p style="letter-spacing: 2px;">WE ARE GETTING MARRIED</p>
        <h1>Michel & Lynn</h1>
        <p class="date">Saturday, August 8, 2026</p>

        <div class="countdown" id="timer">
            <div class="time-box"><span id="days">00</span><div class="time-label">Days</div></div>
            <div class="time-box"><span id="hours">00</span><div class="time-label">Hours</div></div>
            <div class="time-box"><span id="mins">00</span><div class="time-label">Mins</div></div>
            <div class="time-box"><span id="secs">00</span><div class="time-label">Secs</div></div>
        </div>

        <hr style="width: 40%; border: 0.5px solid #ddd; margin: 40px auto;">

        <h3>The Ceremony</h3>
        <p><strong>Notre Dame Church</strong><br>6:00 PM</p>
        
        <h3>The Party</h3>
        <p><strong>Chateau Rweiss</strong><br>7:30 PM</p>

        <div class="rsvp-section">
            <h3 style="color: var(--gold);">RSVP</h3>
            <p style="font-size: 0.9rem;">Kindly respond by July 1st</p>
            <form id="rsvpForm">
                <input type="text" name="Name" placeholder="Full Name" required>
                <select name="Guests">
                    <option value="1">1 Person</option>
                    <option value="2">2 People</option>
                    <option value="3">3 People</option>
                </select>
                <button type="submit" id="submitBtn">CONFIRM ATTENDANCE</button>
            </form>
            <div id="successMessage" style="display:none; color: var(--gold); font-weight: bold; margin-top: 15px;">
                We can't wait to celebrate with you!
            </div>
        </div>
    </div>

    <script>
        // 1. Fixed Open Logic
        function openInvite() {
            const overlay = document.getElementById('envelope-overlay');
            const content = document.getElementById('main-content');
            
            // Start the fade out
            overlay.classList.add('hidden-overlay');
            
            // Show the main content after a small delay
            setTimeout(() => {
                content.classList.add('show-content');
                overlay.style.display = 'none';
            }, 600);
        }

        // 2. Countdown Logic
        const weddingDate = new Date("August 8, 2026 18:00:00").getTime();
        function updateTimer() {
            const now = new Date().getTime();
            const diff = weddingDate - now;
            if (diff < 0) return;

            document.getElementById("days").innerHTML = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById("hours").innerHTML = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById("mins").innerHTML = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById("secs").innerHTML = Math.floor((diff % (1000 * 60)) / 1000);
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // 3. RSVP Submission
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyFW74RzIz_TZGMtAzzcWq6umbdZWFwVakmiyIgmoaLeXw7NNvyGvs4-PydCHrjSDdR/exec';
        const form = document.getElementById('rsvpForm');
        
        form.addEventListener('submit', e => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = "Saving...";
            
            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
                .then(response => {
                    form.style.display = "none";
                    document.getElementById('successMessage').style.display = "block";
                })
                .catch(error => {
                    btn.disabled = false;
                    btn.innerHTML = "Try Again";
                    alert("Error saving RSVP. Please try again!");
                });
        });
    </script>
</body>
</html>
